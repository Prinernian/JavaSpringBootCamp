syntax = "proto3";

option java_package = "it.workStation";
option java_outer_classname = "GradesOuterClass";

service GradeService {
  rpc GetGrade (StudentRequest) returns (GradeResponse);
}

message StudentRequest {
  string student_name = 1;
}

message GradeResponse {
  string student_name = 1;
  int32  grade        = 2;
  string comment      = 3;
}